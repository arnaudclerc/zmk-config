layout: {qmk_keyboard: hillside/46/0_1}
draw_config:
  combo_h: 22
  combo_w: 30
  key_ry: 10
  key_rx: 10
  svg_extra_style: |
    rect.dead, rect.combo.dead {
      visibility : hidden ;
    }
    text.hold {
      fill: #fee;
    }
    text.tl, text.shifted {
      fill: #8df;
    }
    text.tr {
      fill: #27c;
    }
    text.magic {
      fill: #af9;
    }
