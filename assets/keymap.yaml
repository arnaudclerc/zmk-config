layout: {qmk_keyboard: hillside/46/0_1}

draw_config:
  append_colon_to_layer_header: false
  dark_mode: true
  footer_text: "arnaud/zmk-config"
  glyph_tap_size: 15
  glyph_hold_size: 12
  glyph_shifted_size: 10
  legend_rel_y: 1
  outer_pad_w: 10
  outer_pad_h: 10
  small_pad: 4
  combo_h: 22
  combo_w: 30
  key_ry: 10
  key_rx: 10
  svg_extra_style: |
    
    svg path { fill: inherit; }

    svg.keymap {
        --color-bg:      #7c6f64;
        --color-key:     #fbf1c7;
        --color-text:    #3c3836;
        --color-ghost:   #928374;
        --color-dendron: #d5c4a1;
        --color-held:    #bdae93;

        --color-fn:      #458588;
        --color-nav:     #d79921;
        --color-num:     #d65d0e;
        --color-sys:     #689d6a;

        fill: var(--color-text);
        background-color: var(--color-bg);
        font-family: Calibri, system-ui, sans-serif;
        font-size: 16px;
        font-kerning: normal;
        text-rendering: optimizeLegibility;
    }

    text {
        text-anchor: middle;
        dominant-baseline: middle;
        letter-spacing: 0.02em;
    }

    text.tap     { font-weight: 500; }
    text.hold    { font-weight: 400; font-size: 11px; }
    text.shifted { font-weight: 400; font-size: 11px; }
    text.combo, text.left, text.right, text.tl, text.tr, text.bl, text.br { font-size: 10px; }


    text.layer-activator { text-decoration: underline; }
    text.combo.hold, text.combo.shifted, text.combo.left, text.combo.right { font-size: 8px; }

    text.label, text.footer {
        fill: var(--color-key);
        stroke: var(--color-bg);
        stroke-width: 4;
        paint-order: stroke;
    }
    text.label  { font-weight: bold; text-anchor: start; }
    text.footer { text-anchor: end; dominant-baseline: auto; }

    rect.key { fill: var(--color-key); stroke-width: 0; }
    rect.held, rect.combo.held                { fill: var(--color-held); }
    .layer-Combos rect.key                    { fill: var(--color-ghost); }

    path.combo { stroke: var(--color-dendron); stroke-width: 2; stroke-dasharray: 2, 3; opacity: 0.45; fill: none; }

    text.tl, use.tl { fill: var(--color-fn); }
    text.s, use.s { fill: var(--color-num); }

    .keypos-32 text.hold { fill: var(--color-num); font-size: 15px; }

    .icon-tabler > path                             { fill: inherit; stroke: inherit; stroke-width: 2; }
    .icon-tabler > path[stroke="none"][fill="none"] { visibility: hidden; }

    @media (prefers-color-scheme: dark) {
        svg.keymap {
            --color-bg:      #a89984;
            --color-key:     #282828;
            --color-text:    #ebdbb2;
            --color-ghost:   #928374;
            --color-dendron: #504945;
            --color-held:    #665c54;

            --color-fn:      #458588;
            --color-nav:     #fabd2f;
            --color-num:     #d65d0e;
            --color-sys:     #689d6a;
        }
    }
    
    rect.dead {
      visibility : hidden ;
    }
    text.shifted {
      fill: #8df;
    }
